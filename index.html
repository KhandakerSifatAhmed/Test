<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneha the Chicken | Egg Blast Challenge</title>
    <meta name="description" content="Catch and blast eggs laid by Sneha the Chicken in this fast-paced, vibrant web-based game.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>Sneha the<span>Chicken</span></h1>
    </header>

    <main id="game-container">
        <div class="stats">
            Score: <span id="score">0</span>
        </div>

        <div id="chicken">
            <img src="sneha_the_chicken.png" alt="Sneha the Chicken">
        </div>

        <div class="instruction">
            Click the eggs to blast them before they grow!
        </div>
    </main>

    <!-- JS Logic -->
    <script src="script.js"></script>
</body>
</html>
